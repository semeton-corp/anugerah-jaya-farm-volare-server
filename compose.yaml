name: volare

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_FORWARD_PORT}:${BACKEND_PORT}"
    depends_on:
      - postgres
      - redis
    networks:
      - volare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: volare_db
    ports:
      - "${POSTGRES_FORWARD_PORT}:${POSTGRES_PORT}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - volare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_FORWARD_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    command:
      ["redis-server", "--requirepass", "redis-booktify", "--appendonly", "yes"]
    networks:
      - volare-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis-volare", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.25.3
    container_name: nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - volare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
  redis_data:

networks:
  volare-network:
    driver: bridge
